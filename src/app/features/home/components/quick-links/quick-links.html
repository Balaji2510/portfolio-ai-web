<section class="quick-links">

    <div class="container">

        <div class="header">

            <span>

                Quick Access

            </span>

            <h2>

                Explore My Portfolio

            </h2>

            <p>

                Jump directly to the section you're interested in.

            </p>

        </div>

        <div class="grid">

            @for(link of links; track link.title){

                <div class="card">

                    <div class="icon">

                        {{ link.icon }}

                    </div>

                    <h3>

                        {{ link.title }}

                    </h3>

                    <p>

                        {{ link.description }}

                    </p>

                    @if(link.external){

                        <a
                            [href]="link.url"
                            target="_blank">

                            Open →

                        </a>

                    } @else {

                        <a
                            [routerLink]="link.route">

                            Explore →

                        </a>

                    }

                </div>

            }

        </div>

    </div>

</section>
