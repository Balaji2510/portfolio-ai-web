<div class="project-card">

    <div class="image">

        <img [src]="project.image" [alt]="project.title">

        @if(project.featured){

        <span class="featured">

            Featured

        </span>

        }

    </div>

    <div class="content">

        <h3>

            {{project.title}}

        </h3>

        <p>

            {{project.description}}

        </p>

        <div class="chips">

            @for(tech of project.technologies; track tech){

            <app-technology-chip [label]="tech">
            </app-technology-chip>

            }

        </div>
        <div class="actions">

            <a [href]="project.github" target="_blank" class="github">

                GitHub

            </a>

            <a [href]="project.liveDemo" target="_blank" class="demo">

                Live Demo

            </a>

        </div>

    </div>

</div>
