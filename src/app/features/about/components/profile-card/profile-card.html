<div class="card">

    <img
        [src]="profile.profileImage"
        [alt]="profile.name">

    <h2>

        {{ profile.name }}

    </h2>

    <h4>

        {{ profile.designation }}

    </h4>

    <p>

        {{ profile.location }}

    </p>

    <a
        [href]="'mailto:' + profile.email">

        {{ profile.email }}

    </a>

</div>
